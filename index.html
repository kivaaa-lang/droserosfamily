<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DROSEROS FAMILY</title>

<style>
body{
background:#0d0d0d;
color:white;
font-family:Arial,sans-serif;
margin:0;
}

header{
background:#8b0000;
padding:20px;
text-align:center;
box-shadow:0 0 20px red;
}

h1{
margin:0;
font-size:30px;
}

.container{
padding:20px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 10px rgba(255,0,0,.5);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
color:white;
border:1px solid red;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:red;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:active{
background:#a00;
}

.booked{
color:red;
font-weight:bold;
}

.available{
color:lime;
font-weight:bold;
}

#message{
margin-top:15px;
padding:10px;
border-radius:8px;
display:none;
font-weight:bold;
text-align:center;
}

.msg-success{
background:#0d3d0d;
color:lime;
}

.msg-error{
background:#3d0d0d;
color:red;
}
</style>

</head>
<body>

<header>
<h1>DROSEROS FAMILY</h1>
<p>Invitation Registration</p>
</header>

<div class="container">

<div class="card">
<h2>📅 Open Invitation</h2>
<p>1 Juli 2026 - 15 Juli 2026</p>
</div>

<div class="card">
<h2>🔒 Tanggal Terisi</h2>

<p class="booked">❌ 3 Juli</p>

<p class="available">✅ Selain 3 Juli, semua tanggal 1-15 Juli tersedia</p>

</div>

<div class="card">

<h2>📝 Registrasi</h2>

<input id="nama" placeholder="Nama Community">

<input id="discord" placeholder="Username Discord">

<input id="tanggal" type="date" min="2026-07-01" max="2026-07-15">

<input id="waktu" type="time">

<button onclick="submitForm()">SUBMIT INVITATION</button>

<div id="message"></div>

</div>

</div>

<script>
function submitForm(){
  var nama = document.getElementById('nama').value.trim();
  var discord = document.getElementById('discord').value.trim();
  var tanggal = document.getElementById('tanggal').value;
  var waktu = document.getElementById('waktu').value;
  var msg = document.getElementById('message');

  // Validasi field kosong
  if(!nama || !discord || !tanggal || !waktu){
    showMessage('❌ Mohon lengkapi semua data sebelum submit!', 'error');
    return;
  }

  // Validasi rentang tanggal undangan (1-15 Juli 2026)
  var tglDipilih = new Date(tanggal);
  var tglMulai = new Date('2026-07-01');
  var tglAkhir = new Date('2026-07-15');

  if(tglDipilih < tglMulai || tglDipilih > tglAkhir){
    showMessage('❌ Invitation hanya dibuka 1 - 15 Juli 2026!', 'error');
    return;
  }

  // Validasi tanggal yang sudah terisi (3 Juli)
  var tanggalTerisi = ['2026-07-03'];

  if(tanggalTerisi.indexOf(tanggal) !== -1){
    showMessage('❌ Maaf, tanggal 3 Juli sudah terisi. Silakan pilih tanggal lain!', 'error');
    return;
  }

  // Kalau semua validasi lolos
  showMessage('✅ Invitation berhasil terkirim! Terima kasih, ' + nama, 'success');

  // Reset form setelah berhasil
  document.getElementById('nama').value = '';
  document.getElementById('discord').value = '';
  document.getElementById('tanggal').value = '';
  document.getElementById('waktu').value = '';
}

function showMessage(text, type){
  var msg = document.getElementById('message');
  msg.innerText = text;
  msg.style.display = 'block';
  msg.className = type === 'success' ? 'msg-success' : 'msg-error';
}
